<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restart Service</title>
    <style>
        * {
            font-family: arial;
        }

        button {
            padding: 8px 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
        }

        button:hover {
            background-color: #9e0000;
        }

        button:disabled {
            background-color: #000000;
            cursor: not-allowed;
        }

        .optionbox {
            border: 1px solid #000000;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        #output {
            width: 100%;
            overflow-x: scroll;
        }
    </style>
</head>

<body>
    <h1>Service Admin</h1>
    <h3 id="currentUser">Current User: Loading...</h3>
    <div id="login" style="display: none;">
        <input type="text" id="usernameInput" placeholder="Enter your email" style="padding: 8px; font-size: 16px;">
        <input type="password" id="passwordInput" placeholder="Enter your password"
            style="padding: 8px; font-size: 16px;">
        <button id="loginButton">Login</button>
    </div>
    <div id="panel" style="display: none;">{inner}</div>
    <script>
        function pjs(text) {
            try {
                return JSON.parse(text);
            }
            catch (e) { return { e: "Malformed JSON", raw: text } };
        }
        async function init(alreadypresent = false) {
            try {
                portalinit();
                document.getElementById("currentUser").innerText = "Current User: Manual Restart Token";
            }
            catch (e) {
                function initlogin(alreadypresent) {
                    if (!alreadypresent) {
                        window.addEventListener("keydown", (e) => {
                            if (e.key === "Enter" && document.getElementById("login").style.display === "block" && !document.getElementById("login").disabled) {
                                document.getElementById("loginButton").click();
                            }
                        });
                        document.getElementById("loginButton").addEventListener("click", async () => {
                            document.getElementById("login").disabled = true;
                            const username = document.getElementById("usernameInput").value;
                            const password = document.getElementById("passwordInput").value;
                            if (!username || !password) {
                                alert("Please enter both email and password.");
                                return;
                            }
                            const res = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ u: username, p: password }) }).then(res => res.json()).catch(err => ({ e: err.toString() }));
                            if (res.e) {
                                alert("Login failed: " + res.e);
                                return;
                            }
                            localStorage.setItem("auroraAuth", JSON.stringify({ email: username, token: res.token, expires: res.expires }));
                            init(true)
                        });
                    }
                }
                const token = pjs(localStorage.getItem("auroraAuth") || "{e:\"Missing token\"}") || { e: "Malformed token" };
                if (token.e) {
                    document.getElementById("currentUser").innerText = "Current User: Not logged in";
                    document.getElementById("login").style.display = "block";
                    initlogin(alreadypresent);
                    localStorage.removeItem("auroraAuth");
                }
                else {
                    if (token.expires && new Date(token.expires) < new Date()) {
                        document.getElementById("currentUser").innerText = "Current User: Session expired";
                        document.getElementById("login").style.display = "block";
                        initlogin(alreadypresent);
                        localStorage.removeItem("auroraAuth");
                        return;
                    }
                    if (!token.token) {
                        document.getElementById("currentUser").innerText = "Current User: Not logged in";
                        document.getElementById("login").style.display = "block";
                        initlogin(alreadypresent);
                        localStorage.removeItem("auroraAuth");
                        return;
                    }
                    const currentUser = await fetch("/api/users/me", { method: "GET", headers: { authorization: token.token } }).then(res => res.json()).catch(err => {e: err.toString()});
                    if (!currentUser || currentUser.e) {
                        document.getElementById("currentUser").innerText = "Current User: Not logged in";
                        document.getElementById("login").style.display = "block";
                        initlogin(alreadypresent);
                        if (!currentUser && !currentUser.e) localStorage.removeItem("auroraAuth");
                    }
                    else if (currentUser.user.role !== "Admin") {
                        document.getElementById("currentUser").innerText = "Current User: " + currentUser.user.displayname + " (Unauthorized)";
                        document.getElementById("login").style.display = "none";
                    }
                    else {
                        document.getElementById("currentUser").innerText = "Current User: " + currentUser.user.displayname;
                        document.getElementById("login").style.display = "none";
                        const innerHTML = await fetch("/api/restart/getpanel", { method: "GET", headers: { authorization: token.token } }).then(res => res.text()).catch(err => null);
                        document.getElementById("panel").innerHTML = innerHTML || "<h3>Failed to load admin panel.</h3>";
                        const oldScript = document.getElementById('newscript');
                        if (oldScript) {
                            const newScript = document.createElement('script');
                            newScript.textContent = oldScript.textContent;
                            document.body.appendChild(newScript);
                            portalinit();
                        }
                        document.getElementById("panel").style.display = "block";
                    }
                }
                document.getElementById("login").disabled = false;
            }
        }
        init();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restart Service</title>
    <style>
        * {
            font-family: arial;
        }

        button {
            padding: 8px 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
        }

        button:hover {
            background-color: #9e0000;
        }

        button:disabled {
            background-color: #000000;
            cursor: not-allowed;
        }

        .optionbox {
            border: 1px solid #000000;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        #output {
            width: 100%;
            overflow-x: scroll;
        }
    </style>
</head>

<body>
    <h1>Service Admin</h1>
    <h3 id="currentUser">Current User: Loading...</h3>
    <div id="login" style="display: none;">
        <input type="text" id="usernameInput" placeholder="Enter your email" style="padding: 8px; font-size: 16px;">
        <input type="password" id="passwordInput" placeholder="Enter your password" style="padding: 8px; font-size: 16px;">
        <button id="loginButton">Login</button>
    </div>
    <div id="panel" style="display: none;">{inner}</div>
    <script>
        async function init() {
            //const currentUser = await fetch("/api/restart/auth", {method: "GET", headers: {authorization:""}}).then(res => res.json()).catch(err => null);
            document.getElementById("panel").style.display = "block";
            initPanel();
        }
    </script>
</body>

</html>

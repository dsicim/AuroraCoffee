<tr>
    <td style="padding:12px 16px 12px 0;border-bottom:1px solid #dfe7de;vertical-align:top;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
            <tr>
                <td style="padding:0 14px 0 0;vertical-align:top;width:80px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="80" style="width:80px;height:80px;border:1px solid #d3ddd1;border-radius:15px;background:#f2f7f1;">
                        <tr>
                            <td align="center" valign="middle" style="font-size:12px;line-height:1.4;color:#6f8a73;">
                                Product
                            </td>
                        </tr>
                    </table>
                </td>
                <td style="padding:0 16px 0 0;vertical-align:top;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                        <tr>
                            <td style="padding:0;font-size:16px;line-height:1.5;color:#24352b;font-weight:bold;">
                                {{ITEM_NAME}}
                            </td>
                        </tr>
                        <tr>
                            <td style="padding:6px 0 0;font-size:14px;line-height:1.7;color:#46604f;">
                                {{ITEM_OPTIONS}}
                            </td>
                        </tr>
                        <tr>
                            <td style="padding:4px 0 0;font-size:14px;line-height:1.7;color:#46604f;">
                                Amount: {{ITEM_AMOUNT}}
                            </td>
                        </tr>
                    </table>
                </td>
                <td align="right" style="padding:0;vertical-align:top;white-space:nowrap;font-size:15px;line-height:1.5;color:#24352b;font-weight:bold;">
                    {{ITEM_PRICE}}
                </td>
            </tr>
        </table>
    </td>
</tr>

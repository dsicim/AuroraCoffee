<div style="display: grid; align-items: start; grid-template-columns: auto max-content;">
    <div style="display:flex">
        <div style="display: flex; gap: 14px;"><img
                style="height:80px; width: 80px; border: 1px solid black;border-radius: 15px;">
            <div style="display: flex; flex-direction: column; gap: 5px; justify-content: start;">
                <h4 style="margin: 0px; margin-top: 10px;">{{ITEM_NAME}}</h4>
                <p style="margin: 0px; font-size: 15px;">{{ITEM_OPTIONS}}</p>
                <p style="margin: 0px; font-size: 15px;">Amount: {{ITEM_AMOUNT}}</p>
            </div>
        </div>
    </div>
    <p style="margin: 0px; margin-top: 10px;">{{ITEM_PRICE}}</p>
</div>

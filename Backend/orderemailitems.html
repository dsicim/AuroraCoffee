<tr>
    <td colspan="2" style="padding:10px 0;border-bottom:1px solid #e7eee6;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td width="80" valign="top" style="padding-right:12px;">
                    <img src="{{ITEM_IMAGE_URL}}" width="80" height="80" alt="{{ITEM_NAME}}"
                        style="display:block;border:1px solid #d9e3d8;border-radius:12px;object-fit:cover;"
                        border="0" />
                </td>
                <td valign="top" style="font-size:14px;line-height:1.4;color:#24352b;">
                    <strong>{{ITEM_NAME}}</strong><br>
                    <span style="font-size:13px;color:#46604f;">{{ITEM_OPTIONS}}</span><br>
                    <span style="font-size:13px;color:#46604f;">Amount: {{ITEM_AMOUNT}}</span>
                </td>
                <td valign="top" align="right"
                    style="white-space:nowrap;font-size:14px;color:#24352b;padding-left:10px;">
                    {{ITEM_PRICE}}
                </td>
            </tr>
        </table>
    </td>
</tr>

<tr>
    <td style="padding:12px 0;border-bottom:1px solid #dfe7de;vertical-align:top;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
            <tr>
                <td style="padding:0 16px 0 0;vertical-align:top;">
                    <p style="margin:0;font-size:16px;line-height:1.5;color:#24352b;font-weight:bold;">{{ITEM_NAME}}</p>
                    <p style="margin:6px 0 0;font-size:14px;line-height:1.7;color:#46604f;">{{ITEM_OPTIONS}}</p>
                    <p style="margin:4px 0 0;font-size:14px;line-height:1.7;color:#46604f;">Amount: {{ITEM_AMOUNT}}</p>
                </td>
                <td align="right" style="padding:0;vertical-align:top;white-space:nowrap;">
                    <p style="margin:0;font-size:15px;line-height:1.5;color:#24352b;font-weight:bold;">{{ITEM_PRICE}}</p>
                </td>
            </tr>
        </table>
    </td>
</tr>
